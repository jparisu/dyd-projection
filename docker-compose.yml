# Infrastructure for the upcoming persistence phase (design phase 10).
# The in-memory MVP does NOT require these; bring them up only when wiring Prisma.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dnd
      POSTGRES_PASSWORD: dnd
      POSTGRES_DB: dnd
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dnd']
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional — for scaling realtime across processes later.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
